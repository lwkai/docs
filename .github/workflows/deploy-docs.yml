name: 部署文档

on:
    push:
        branches:
            - main

permissions:
    contents: write

# 👇 绝招：把环境变量提到全局最顶层！这样无论是 pnpm 还是 dumi，全程都必须听它的
env:
    PNPM_ALLOW_ONLY_BUILT_DEPENDENCIES: "true"

jobs:
    deploy-gh-pages:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: 设置 pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10.14.0

            - name: 设置 Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: pnpm

            - name: 安装依赖
              run: pnpm install --frozen-lockfile

            - name: 构建文档
              env:
                NODE_OPTIONS: --max_old_space_size=8192
              run: |-
                  pnpm run build
                  > dist\.nojekyll

            - name: 部署文档
              uses: JamesIves/github-pages-deploy-action@v4
              with:
                  branch: gh-pages
                  folder: dist
